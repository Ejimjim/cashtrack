name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      APP_IMAGE: ghcr.io/${{ github.repository_owner }}/cashtrack-app
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:latest
            ${{ env.APP_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      APP_IMAGE: ghcr.io/${{ github.repository_owner }}/cashtrack-app
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: docker-compose.yml
          target: /opt/cashtrack
          overwrite: true

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          envs: TELEGRAM_BOT_TOKEN,OPENAI_API_KEY,APP_IMAGE,GHCR_TOKEN
          script: |
            cd /opt/cashtrack

            printf '%s\n' \
              "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}" \
              "OPENAI_API_KEY=${OPENAI_API_KEY}" \
              "APP_IMAGE=${APP_IMAGE}" \
              "PORT=3010" \
              "DB_PATH=/data/cashtrack.db" > .env

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            docker compose pull
            docker compose up -d --remove-orphans
